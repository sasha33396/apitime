services:
  apitime:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/app/data
    expose:
      - "3000"
    volumes:
      # история изменений пишется сюда и сохраняется на хосте (./data/history.jsonl)
      - ./data:/app/data
    networks:
      - proxy

# Подключаемся к уже существующей docker-сети, в которой работает Caddy
# проекта reshala-web. Имя сети можно переопределить через CADDY_NETWORK в .env.
# Узнать имя: docker network ls  (обычно <папка-проекта>_default).
networks:
  proxy:
    external: true
    name: ${CADDY_NETWORK:-reshala-web_default}
